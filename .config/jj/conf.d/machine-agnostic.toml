"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[aliases]
forgotten = ["log", "-r", "forgotten", "-T", "comfortable_with_files"]

[templates]
draft_commit_description = '''
concat(
  coalesce(description, "\n"),
  surround(
    "\nJJ: This commit contains the following changes:\n", "",
    indent("JJ:     ", diff.stat(72)),
  ),
  "\nJJ: ignore-rest\n",
  diff.git(),
)
'''
git_push_bookmark = """
  my_git_push_bookmark
"""

[template-aliases]
'format_timestamp(timestamp)' = 'timestamp.ago()'

'format_short_cryptographic_signature(sig)' = '''
  if(sig, "🔑", "⚠️")
'''

"first_line_suffix(description)" = """
  description
    .first_line()
    .replace(regex:"^[?[[:upper:]]+-[[:digit:]]+]?[[:blank:]]+", "")
    .lower()
    .replace(regex:"[[:^word:]]", "-")
    .replace(regex:"-+", "-")
    .replace(regex:"^-|-$", "")
    .substr(0, 24)
    .replace(regex:"-$", "")
"""

"jira_issue_prefix(description)" = """
  description
    .match(regex:"^[?[[:upper:]]+-[[:digit:]]+]?[[:blank:]]+")
    .match(regex:"[[:upper:]]+-[[:digit:]]+")
"""

comfortable_with_files = """
builtin_log_compact(self) ++ "\n" ++
diff.summary() ++ "\n"
"""

my_git_push_bookmark = """
  separate(
    "/",
    "richard.morrill",
    jira_issue_prefix(description),
    first_line_suffix(description),
  )
"""


[revsets]

log = 'present(@) | tracked_remote_bookmarks() | tracked_remote_bookmarks()..(mine() | bookmarks(substring:"push-")) | trunk()..bookmarks(substring:"push-") | (visible_heads() & mine()) | present(@-)'

[revset-aliases]

forgotten = '(visible_heads() & mine()) ~ tracked_remote_bookmarks()::'

[git]
private-commits = '''description(glob:'private:*')'''

[snapshot]
max-new-file-size = 1000000000